---
name: Run CI Tests

on:
  push:
    branches: ['master', 'develop*', 'maintenance/*', 'feature/*']
  pull_request:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MYSQL_TEST_USER: root
  MYSQL_TEST_PASS: "heyPassw-!*20oRd"
  MYSQL_TEST_ADDR: 127.0.0.1:3306
  MYSQL_TEST_DBNAME: testgo
  MYSQL_TEST_CONCURRENT: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: dominikh/staticcheck-action@v1.3.1
        with:
          install-go: false

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.final-matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        name: build matrix
        uses: mariadb-corporation/connector-ci-build-matrix@main
        with:
          additional-matrix: '[{"name": "MariaDB 11.4", "os": "ubuntu-latest", "db-type": "community", "db-tag": "11.4", "go": "1.24"},{"name": "MariaDB 11.4", "os": "ubuntu-latest", "db-type": "community", "db-tag": "11.4", "go": "1.25"},{"name": "MariaDB 11.4", "os": "ubuntu-latest", "db-type": "community", "db-tag": "11.4", "go": "1.26"}]'

  ci:
    name: ${{ matrix.name }}${{ matrix.go && matrix.go != '1.26' && format(' - go {0}', matrix.go) || '' }}
    needs: setup
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue-on-error || false }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Test Environment
        id: setup-env
        uses: mariadb-corporation/connector-ci-setup@master
        with:
          db-type: ${{ matrix.db-type }}
          db-tag: ${{ matrix.db-tag }}
          test-db-password: ${{ env.MYSQL_TEST_PASS }}
          test-db-database: ${{ env.MYSQL_TEST_DBNAME }}
          test-db-port: 3306
          additional-conf: |
            max_allowed_packet=48MB
            max_connections=50
            local_infile=1
            performance_schema=on
          registry-user: ${{ matrix.db-type == 'enterprise' && secrets.ENTERPRISE_USER || (secrets.DOCKER_TOKEN != '' && secrets.DOCKER_LOGIN || '') }}
          registry-password: ${{ matrix.db-type == 'enterprise' && secrets.ENTERPRISE_TOKEN || secrets.DOCKER_TOKEN }}
          os: ${{ matrix.os }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go || '1.26' }}

      - name: Run Tests
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.out -parallel 10
        env:
          LOCAL_DB: ${{ steps.setup-env.outputs.database-type }}
          DB_TYPE: ${{ matrix.db-type }}
          DB_VERSION: ${{ matrix.db-tag }}

      - name: Run Benchmarks
        run: |
          go test -run '^$' -bench .

      - name: Generate Coverage Report
        shell: bash
        run: |
          bash <(curl -s https://codecov.io/bash)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
